<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan & Pengingat WA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-lg w-full">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Formulir Pencatat Kegiatan</h2>
        
        <form name="form-kegiatan" id="formKegiatan" class="space-y-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Kegiatan</label>
                <input type="text" name="namaKegiatan" id="namaKegiatan" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Tanggal</label>
                <input type="date" name="tanggal" id="tanggal" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700">Waktu Mulai</label>
                    <input type="time" name="waktuMulai" id="waktuMulai" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="w-1/2">
                    <label class="block text-sm font-medium text-gray-700">Waktu Selesai</label>
                    <input type="time" name="waktuSelesai" id="waktuSelesai" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Tempat</label>
                <input type="text" name="tempat" id="tempat" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Keterangan Tambahan</label>
                <textarea name="keterangan" id="keterangan" rows="3" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-300">
                Simpan Kegiatan
            </button>
            
            <p id="pesanStatus" class="text-center text-sm font-medium mt-2 hidden"></p>
        </form>
    </div>

    <script>
        // MASUKKAN URL GOOGLE SCRIPT ANDA DI BAWAH INI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGBO-9YK8vd5Dvxt1UvoCjg7IjzqUXrE_zOU848dZU001k9VRfJIEiDYIp6G92njijag/exec'; 

        const form = document.forms['form-kegiatan'];
        const btnSubmit = document.getElementById('btnSubmit');
        const pesanStatus = document.getElementById('pesanStatus');

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            // Ubah tombol saat proses pengiriman
            btnSubmit.innerHTML = 'Menyimpan...';
            btnSubmit.disabled = true;

            // Mengubah format data menjadi teks murni agar mudah dibaca Google
            const formData = new FormData(form);
            const dataUntukGoogle = new URLSearchParams(formData);

            // Mengirim data ke Google Apps Script
            fetch(scriptURL, { 
                method: 'POST', 
                body: dataUntukGoogle 
            })
            .then(response => {
                // Tampilan jika sukses
                pesanStatus.innerHTML = 'Kegiatan berhasil disimpan!';
                pesanStatus.className = 'text-center text-sm font-medium mt-2 text-green-600 block';
                form.reset();
                
                // Kembalikan tombol ke semula
                btnSubmit.innerHTML = 'Simpan Kegiatan';
                btnSubmit.disabled = false;
                setTimeout(() => pesanStatus.classList.add('hidden'), 3000);
            })
            .catch(error => {
                // Tampilan jika error
                pesanStatus.innerHTML = 'Gagal menyimpan. Cek koneksi Anda.';
                pesanStatus.className = 'text-center text-sm font-medium mt-2 text-red-600 block';
                
                // Kembalikan tombol ke semula
                btnSubmit.innerHTML = 'Simpan Kegiatan';
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
