<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuruPro - Personal ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #4338ca 100%); }
        .menu-aktif { background-color: rgba(255, 255, 255, 0.1); border-left: 4px solid #60a5fa; color: white; }
        .menu-nonaktif { color: #93c5fd; border-left: 4px solid transparent; }
        .menu-nonaktif:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }
        .form-card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); max-width: 800px; margin: 0 auto; }
        .input-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #4b5563; margin-bottom: 0.5rem; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 0.75rem 1rem; border: 1px solid #d1d5db; border-radius: 0.5rem; outline: none; }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        .btn-submit { width: 100%; background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%); color: white; font-weight: bold; padding: 0.75rem 1.5rem; border-radius: 0.5rem; margin-top: 1rem;}
        /* Spinner Loading */
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800 antialiased overflow-x-hidden">

    <div id="loginPage" class="min-h-screen flex items-center justify-center gradient-bg p-4 transition-all duration-500">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <i class="fas fa-chalkboard-teacher text-5xl text-blue-600 mb-4"></i>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Guru<span class="text-blue-600">Pro</span></h2>
            <div class="space-y-4 text-left">
                <input type="text" id="username" placeholder="Username" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="cekLogin()" class="w-full gradient-bg text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl">Masuk</button>
            </div>
        </div>
    </div>

    <div id="dashboardPage" class="hidden min-h-screen flex flex-col md:flex-row">
        <aside class="w-full md:w-64 gradient-bg text-white flex flex-col shadow-2xl md:min-h-screen z-20">
            <div class="p-6 text-center border-b border-white/10"><h2 class="text-2xl font-bold">Guru<span class="text-blue-300">Pro</span></h2></div>
            <nav class="flex-1 px-2 py-6 space-y-2">
                <button onclick="bukaMenu('home')" id="btn-home" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-aktif"><i class="fas fa-chart-pie w-5 text-center"></i> <span>Dashboard Utama</span></button>
                <button onclick="bukaMenu('jadwal-saya')" id="btn-jadwal-saya" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-nonaktif"><i class="fas fa-calendar w-5 text-center"></i> <span>Jadwal Saya</span></button>
                <button onclick="bukaMenu('jadwal')" id="btn-jadwal" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-nonaktif"><i class="fas fa-plus-circle w-5 text-center"></i> <span>Input Jadwal</span></button>
                <button onclick="bukaMenu('kegiatan')" id="btn-kegiatan" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-nonaktif"><i class="fas fa-clipboard-list w-5 text-center"></i> <span>Input Agenda</span></button>
                <button onclick="bukaMenu('laporan')" id="btn-laporan" class="w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-nonaktif"><i class="fas fa-edit w-5 text-center"></i> <span>Laporan Harian</span></button>
            </nav>
            <div class="p-4 border-t border-white/10"><button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-red-300 hover:text-white hover:bg-red-500 rounded-lg"><i class="fas fa-sign-out-alt w-5 text-center"></i> <span>Keluar</span></button></div>
        </aside>

        <main class="flex-1 bg-gray-50 h-screen overflow-y-auto">
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center sticky top-0 z-10">
                <h2 id="judulHalaman" class="text-xl font-bold text-gray-800">Dashboard Utama</h2>
                <p id="realtimeClock" class="text-lg font-bold text-blue-600 hidden sm:block">00:00:00</p>
            </header>

            <div class="p-8">
                <div id="loadingData" class="hidden flex flex-col items-center justify-center py-20">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                    <p class="text-gray-500 font-semibold">Menarik data dari Google Sheets...</p>
                </div>

                <section id="menu-home" class="menu-section block">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-chart-bar mr-2 text-blue-500"></i> Kepadatan Jadwal Mengajar (Real-Time)</h3>
                        <div class="relative h-64 w-full"><canvas id="jadwalChart"></canvas></div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2"><i class="fas fa-bullhorn mr-2 text-purple-500"></i> Agenda Bulan Ini</h3>
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-left text-sm whitespace-nowrap">
                                <thead class="uppercase tracking-wider border-b-2 border-gray-200 bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 font-semibold text-gray-600">Tanggal</th>
                                        <th class="px-6 py-3 font-semibold text-gray-600">Waktu</th>
                                        <th class="px-6 py-3 font-semibold text-gray-600">Nama Agenda</th>
                                        <th class="px-6 py-3 font-semibold text-gray-600">Tempat</th>
                                    </tr>
                                </thead>
                                <tbody id="tabelAgendaBulanIni" class="divide-y divide-gray-100 text-gray-600">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </section>

                <section id="menu-jadwal-saya" class="menu-section hidden">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Jadwal Mengajar Rutin</h2>
                    <div id="containerJadwal" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        </div>
                </section>

                <section id="menu-jadwal" class="menu-section hidden">
                    <div class="form-card">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i class="fas fa-calendar-alt text-blue-600 mr-2"></i> Input Jadwal Rutin</h2>
                        <form id="formJadwal" class="space-y-5">
                            <input type="hidden" name="action" value="jadwal">
                            <div class="input-group"><label>Hari</label><select name="hari" required><option value="Senin">Senin</option><option value="Selasa">Selasa</option><option value="Rabu">Rabu</option><option value="Kamis">Kamis</option><option value="Jumat">Jumat</option><option value="Sabtu">Sabtu</option></select></div>
                            <div class="grid grid-cols-2 gap-5">
                                <div class="input-group"><label>Jam Mulai</label><input type="time" name="jamMulai" required></div>
                                <div class="input-group"><label>Jam Selesai</label><input type="time" name="jamSelesai" required></div>
                            </div>
                            <div class="grid grid-cols-2 gap-5">
                                <div class="input-group"><label>Kelas (Cth: 5F)</label><input type="text" name="kelas" required></div>
                                <div class="input-group"><label>Mata Pelajaran</label><input type="text" name="mapel" value="TIK" required></div>
                            </div>
                            <button type="submit" class="btn-submit">Simpan Jadwal</button>
                        </form>
                    </div>
                </section>

                <section id="menu-kegiatan" class="menu-section hidden">
                    <div class="form-card">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i class="fas fa-clipboard-list text-purple-600 mr-2"></i> Input Agenda Tambahan</h2>
                        <form id="formKegiatan" class="space-y-5">
                            <input type="hidden" name="action" value="kegiatan">
                            <div class="grid grid-cols-2 gap-5"><div class="input-group"><label>Nama Agenda</label><input type="text" name="namaKegiatan" required></div><div class="input-group"><label>Tanggal</label><input type="date" name="tanggal" required></div></div>
                            <div class="grid grid-cols-2 gap-5"><div class="input-group"><label>Mulai</label><input type="time" name="waktuMulai" required></div><div class="input-group"><label>Selesai</label><input type="time" name="waktuSelesai" required></div></div>
                            <div class="input-group"><label>Tempat</label><input type="text" name="tempat" required></div>
                            <div class="input-group"><label>Keterangan</label><textarea name="keterangan"></textarea></div>
                            <button type="submit" class="btn-submit">Simpan Agenda</button>
                        </form>
                    </div>
                </section>

                <section id="menu-laporan" class="menu-section hidden">
                    <div class="form-card">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4"><i class="fas fa-edit text-green-600 mr-2"></i> Buat Laporan Harian</h2>
                        <form id="formLaporan" class="space-y-5">
                            <input type="hidden" name="action" value="laporan">
                            <div class="grid grid-cols-2 gap-5"><div class="input-group"><label>Tanggal</label><input type="date" name="tanggalLaporan" required></div><div class="input-group"><label>Kelas Target</label><input type="text" name="kelasLaporan" required></div></div>
                            <div class="input-group"><label>Materi / Aktivitas</label><textarea name="isiLaporan" required></textarea></div>
                            <div class="input-group"><label>Catatan Opsional</label><input type="text" name="ketLaporan"></div>
                            <button type="submit" class="btn-submit">Submit Laporan</button>
                        </form>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <script>
        // MASUKKAN URL GOOGLE WEB APP (YANG BARU DI-DEPLOY) DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGBO-9YK8vd5Dvxt1UvoCjg7IjzqUXrE_zOU848dZU001k9VRfJIEiDYIp6G92njijag/exec'; 

        // 1. LOGIN
        function cekLogin() {
            if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === '12345') {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('dashboardPage').classList.remove('hidden');
                tarikDataRealtime(); // Panggil data dari Excel saat berhasil login
            } else {
                Swal.fire({ icon: 'error', title: 'Ditolak', text: 'Username atau Password salah!' });
            }
        }

        // 2. NAVIGASI
        function bukaMenu(idMenu) {
            document.querySelectorAll('.menu-section').forEach(el => el.classList.add('hidden'));
            document.getElementById('menu-' + idMenu).classList.remove('hidden');
            const judul = { 'home': 'Dashboard Utama', 'jadwal-saya': 'Jadwal Mengajar Saya', 'jadwal': 'Input Jadwal', 'kegiatan': 'Input Agenda', 'laporan': 'Laporan Harian' };
            document.getElementById('judulHalaman').innerText = judul[idMenu];
            document.querySelectorAll('aside nav button').forEach(btn => btn.className = "w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-nonaktif");
            document.getElementById('btn-' + idMenu).className = "w-full flex items-center gap-4 px-4 py-3 rounded-lg text-left menu-aktif shadow-lg";
        }

        function logout() { location.reload(); }
        setInterval(() => document.getElementById('realtimeClock').innerText = new Date().toLocaleTimeString('id-ID'), 1000);

        // 3. TARIK DATA DARI GOOGLE SHEETS (REAL-TIME)
        let chartInstance = null;
        function tarikDataRealtime() {
            document.getElementById('loadingData').classList.remove('hidden');
            document.getElementById('menu-home').classList.add('hidden');

            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                // A. Render Chart (Kepadatan)
                if(chartInstance) chartInstance.destroy();
                chartInstance = new Chart(document.getElementById('jadwalChart').getContext('2d'), {
                    type: 'bar',
                    data: {
                        labels: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'],
                        datasets: [{ label: 'Total Kelas Diampu', data: data.chart, backgroundColor: '#3b82f6', borderRadius: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                // B. Render Agenda Bulan Ini
                const tbody = document.getElementById('tabelAgendaBulanIni');
                tbody.innerHTML = '';
                if(data.kegiatanBulanIni.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-400">Belum ada agenda bulan ini.</td></tr>';
                } else {
                    data.kegiatanBulanIni.forEach(k => {
                        tbody.innerHTML += `<tr class="hover:bg-gray-50"><td class="px-6 py-4 font-medium text-gray-900">${k.tanggal}</td><td class="px-6 py-4">${k.waktu}</td><td class="px-6 py-4 text-blue-600 font-semibold">${k.nama}</td><td class="px-6 py-4">${k.tempat}</td></tr>`;
                    });
                }

                // C. Render Jadwal Saya (Dikelompokkan per Hari)
                const urutanHari = ["Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
                const containerJadwal = document.getElementById('containerJadwal');
                containerJadwal.innerHTML = '';
                
                urutanHari.forEach(hari => {
                    const jadwalHariIni = data.jadwal.filter(j => j.hari.toLowerCase() === hari.toLowerCase());
                    if(jadwalHariIni.length > 0) {
                        let htmlKartu = `
                        <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                            <h3 class="text-xl font-bold text-white bg-blue-600 px-4 py-2 rounded-lg inline-block mb-4 shadow-md">${hari}</h3>
                            <div class="space-y-3">`;
                        jadwalHariIni.forEach(j => {
                            htmlKartu += `<div class="bg-gray-50 p-3 rounded-lg border-l-4 border-green-500"><p class="text-xs text-gray-500 font-bold mb-1"><i class="far fa-clock"></i> ${j.jam}</p><p class="text-lg font-extrabold text-gray-800">Kelas ${j.kelas}</p><p class="text-sm text-gray-600">${j.mapel}</p></div>`;
                        });
                        htmlKartu += `</div></div>`;
                        containerJadwal.innerHTML += htmlKartu;
                    }
                });

                document.getElementById('loadingData').classList.add('hidden');
                document.getElementById('menu-home').classList.remove('hidden');
            })
            .catch(err => {
                document.getElementById('loadingData').classList.add('hidden');
                Swal.fire('Error', 'Gagal memuat data dari Database.', 'error');
            });
        }

        // 4. SUBMIT FORM KE GOOGLE SHEETS
        function tanganiSubmit(formId) {
            const form = document.getElementById(formId);
            form.addEventListener('submit', e => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                const teksAsli = btn.innerHTML;
                btn.innerHTML = 'Menyimpan...'; btn.disabled = true;

                fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(new FormData(form)) })
                .then(() => {
                    Swal.fire({ icon: 'success', title: 'Tersimpan!', showConfirmButton: false, timer: 1500 });
                    form.reset();
                    tarikDataRealtime(); // Refresh data otomatis setelah simpan
                })
                .finally(() => { btn.innerHTML = teksAsli; btn.disabled = false; });
            });
        }
        tanganiSubmit('formJadwal'); tanganiSubmit('formKegiatan'); tanganiSubmit('formLaporan');
    </script>
</body>
</html>
